backend:
  name: github
  repo: dzu111/kopeladar
  branch: main
  base_url: https://kopeladar-auth.dzulamri070.workers.dev # THE WORKER URL
  auth_endpoint: auth # This matches the /auth in our Worker code

media_folder: "img/events"
public_folder: "/img/events"

collections:
  - name: "events"
    label: "Events"
    folder: "data/events"
    create: true
    format: "json"
    extension: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Event Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false}
      
      # --- NEW FIELDS FOR THE TEMPLATE ---
      - {label: "Event Time", name: "time", widget: "string", hint: "e.g., 09:00 AM - 02:00 PM", required: false}
      - {label: "Location", name: "location", widget: "string", hint: "e.g., Grand Riverview Hotel, Kota Bharu", required: false}
      
      - {label: "Featured Image (Hero & Thumbnail)", name: "image", widget: "image", required: false}
      - {label: "Short Description", name: "description", widget: "text", hint: "Shows on the homepage cards"}
      
      # --- THE DYNAMIC GALLERY ---
      - label: "Event Gallery"
        name: "gallery"
        widget: "list"
        required: false
        collapsed: true
        hint: "Add as many images as you want for the bottom slider."
        field: {label: "Photo", name: "photo", widget: "image"}
        
      - {label: "Body Content", name: "body", widget: "markdown"}